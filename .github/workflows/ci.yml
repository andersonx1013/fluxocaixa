name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FluxoCaixa.sln

      - name: Build
        run: dotnet build FluxoCaixa.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FluxoCaixa.sln --configuration Release --no-build

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Audit NuGet dependencies
        shell: bash
        run: |
          audit="$(dotnet list FluxoCaixa.sln package --vulnerable --include-transitive)"
          echo "$audit"
          if echo "$audit" | grep -q "has the following vulnerable packages"; then
            exit 1
          fi
