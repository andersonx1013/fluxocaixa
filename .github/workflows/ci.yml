name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FluxoCaixa.sln

      - name: Build
        run: dotnet build FluxoCaixa.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FluxoCaixa.sln --configuration Release --no-build

      - name: Validate Compose
        run: docker compose config --quiet

      - name: Render and verify architecture diagrams
        shell: pwsh
        run: |
          ./scripts/Render-Diagrams.ps1
          git diff --exit-code -- docs/diagrams

      - name: Audit NuGet dependencies
        shell: pwsh
        run: ./scripts/Test-Dependencies.ps1
