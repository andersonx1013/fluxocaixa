<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FluxoCaixa // Preview Responsivo</title>
  <style>
    :root { color-scheme: dark; font-family: "Bahnschrift", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; padding: 22px; color: #e8f4f7; background: #05090d; }
    header { display: flex; justify-content: space-between; align-items: end; margin: 0 auto 18px; max-width: 1200px; }
    h1 { margin: 0; font-size: 24px; }
    p { margin: 6px 0 0; color: #8ca1aa; }
    label { display: flex; align-items: center; gap: 8px; color: #b8ff2c; font: 12px "Cascadia Code", monospace; }
    input { width: 62px; height: 34px; padding: 0 8px; color: #e8f4f7; border: 1px solid #31505c; background: #091219; }
    main { display: flex; justify-content: center; align-items: start; gap: 30px; max-width: 1200px; margin: auto; }
    article { padding: 14px; border: 1px solid #284550; background: #091219; }
    article h2 { margin: 0 0 12px; color: #21d7ff; font: 12px "Cascadia Code", monospace; letter-spacing: .12em; }
    .device { position: relative; overflow: hidden; border: 5px solid #162a33; border-radius: 22px; background: #000; box-shadow: 0 24px 70px #000; }
    .device iframe { position: absolute; inset: 0; border: 0; transform-origin: 0 0; }
    .phone { width: 264px; height: 559px; }
    .phone iframe { width: 390px; height: 844px; transform: scale(.65); }
    .tablet { width: 456px; height: 605px; border-radius: 18px; }
    .tablet iframe { width: 768px; height: 1024px; transform: scale(.58); }
    @media (max-width: 820px) {
      header { align-items: start; flex-direction: column; gap: 14px; }
      main { align-items: center; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div><h1>Preview responsivo</h1><p>Celular 390 × 844 e tablet 768 × 1024.</p></div>
    <label>SLIDE <input id="scene" type="number" min="1" max="12" value="1"></label>
  </header>
  <main>
    <article><h2>MOBILE // PORTRAIT</h2><div class="device phone"><iframe title="Preview mobile"></iframe></div></article>
    <article><h2>TABLET // PORTRAIT</h2><div class="device tablet"><iframe title="Preview tablet"></iframe></div></article>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const input = document.querySelector("#scene");
    const frames = [...document.querySelectorAll("iframe")];
    const initial = Math.min(12, Math.max(1, Number(params.get("scene")) || 1));
    const autoOpenImage = params.get("image") === "1";

    if (autoOpenImage) {
      frames.forEach((frame) => frame.addEventListener("load", () => {
        setTimeout(() => frame.contentDocument.querySelector("#diagramStage")?.click(), 350);
      }));
    }

    function show(scene) {
      input.value = scene;
      frames.forEach((frame) => { frame.src = `/#${scene}`; });
      history.replaceState(null, "", `?scene=${scene}${autoOpenImage ? "&image=1" : ""}`);
    }

    input.addEventListener("change", () => show(Math.min(12, Math.max(1, Number(input.value) || 1))));
    show(initial);
  </script>
</body>
</html>
